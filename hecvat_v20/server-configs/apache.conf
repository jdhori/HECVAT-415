# HECVAT 4.1.5 — Apache configuration
# Place this in a <VirtualHost> block, a <Directory> block, or in .htaccess.
# Requires: mod_headers, mod_rewrite, mod_ssl
#
# Enable required modules (Debian/Ubuntu):
#   sudo a2enmod headers rewrite ssl

<VirtualHost *:443>
    ServerName  hecvat.yourdomain.edu
    DocumentRoot /var/www/hecvat
    DirectoryIndex HECVAT-415.html

    # --- TLS ---
    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/yourdomain.crt
    SSLCertificateKeyFile /etc/ssl/private/yourdomain.key
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5
    SSLHonorCipherOrder   on

    <Directory /var/www/hecvat>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all granted

        # ── Security headers ─────────────────────────────────────────────
        # These headers are the primary enforcement mechanism.
        # They complement the <meta> CSP tag in HECVAT-415.html and
        # take precedence over it.

        # Content Security Policy
        Header always set Content-Security-Policy \
            "default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';"

        # Clickjacking protection
        Header always set X-Frame-Options "DENY"

        # MIME-type sniffing prevention
        Header always set X-Content-Type-Options "nosniff"

        # No referrer information sent outside the origin
        Header always set Referrer-Policy "no-referrer"

        # Restrict browser feature APIs
        Header always set Permissions-Policy \
            "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"

        # HSTS — enable once HTTPS is confirmed working
        # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

        # Remove Apache version info
        ServerTokens Prod
        ServerSignature Off
    </Directory>

    # Block hidden files
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # Cache control
    <FilesMatch "\.(js|css)$">
        Header set Cache-Control "public, max-age=3600, must-revalidate"
    </FilesMatch>
    <FilesMatch "\.html$">
        Header set Cache-Control "no-store"
    </FilesMatch>

</VirtualHost>

# Redirect HTTP to HTTPS
<VirtualHost *:80>
    ServerName hecvat.yourdomain.edu
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>
