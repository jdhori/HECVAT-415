# HECVAT 4.1.5 — nginx server block
# Place this inside an existing server {} block, or use as a standalone file
# with: include /path/to/hecvat-nginx.conf;
#
# Tested on nginx 1.18+

server {
    listen       443 ssl http2;
    server_name  hecvat.yourdomain.edu;

    # --- TLS (adjust paths to your certificates) ---
    ssl_certificate     /etc/ssl/certs/yourdomain.crt;
    ssl_certificate_key /etc/ssl/private/yourdomain.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- Document root (folder containing index.html) ---
    root  /var/www/hecvat;
    index index.html;

    location / {
        try_files $uri $uri/ =404;

        # ── Security headers ────────────────────────────────────────────
        # These headers apply to every response. They take precedence over
        # the equivalent <meta> tags in index.html.

        # Content Security Policy
        # Mirrors the meta-tag CSP in index.html exactly.
        # Delivering it as an HTTP header provides stronger enforcement
        # (covers preflight requests, multipart responses, and some
        # browser quirks that ignore meta-tag CSP).
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';"
            always;

        # Clickjacking protection (complements frame-ancestors in CSP)
        add_header X-Frame-Options "DENY" always;

        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Do not send Referer header to any destination
        add_header Referrer-Policy "no-referrer" always;

        # Restrict browser feature access
        add_header Permissions-Policy
            "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"
            always;

        # HSTS — tell browsers to use HTTPS for 1 year
        # Only enable this once you have confirmed HTTPS is working correctly.
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Remove server version banner
        server_tokens off;
    }

    # Deny access to hidden files (e.g. .git, .env)
    location ~ /\. {
        deny all;
    }

    # Cache static assets aggressively; HTML files are not cached
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }
    location ~* \.html$ {
        add_header Cache-Control "no-store";
    }
}

# Redirect HTTP to HTTPS
server {
    listen      80;
    server_name hecvat.yourdomain.edu;
    return 301  https://$host$request_uri;
}
